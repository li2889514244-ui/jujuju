apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: matrixflow-erp
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app.kubernetes.io/name: redis
