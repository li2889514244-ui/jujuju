apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: matrixflow-erp
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
