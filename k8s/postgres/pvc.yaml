apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: matrixflow-erp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 100Gi
