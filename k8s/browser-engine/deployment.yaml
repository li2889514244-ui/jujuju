apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-engine
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: browser-engine
    app.kubernetes.io/part-of: matrixflow-erp
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-engine
        app.kubernetes.io/part-of: matrixflow-erp
    spec:
      serviceAccountName: browser-engine
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: browser-engine
          image: ghcr.io/matrixflow/browser-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: browser-engine-config
            - secretRef:
                name: browser-engine-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
