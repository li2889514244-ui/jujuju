# ============================================================
# MatrixFlow ERP - Secrets Template
# IMPORTANT: Replace all <REPLACE_ME> values before deploying!
# Consider using external-secrets-operator or sealed-secrets
# for production deployments.
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: matrixflow-erp
type: Opaque
stringData:
  # PostgreSQL
  DATABASE_URL: "postgresql://<REPLACE_ME>:<REPLACE_ME>@postgres:5432/matrixflow"
  DATABASE_USERNAME: "<REPLACE_ME>"
  DATABASE_PASSWORD: "<REPLACE_ME>"

  # Redis
  REDIS_URL: "redis://:<REPLACE_ME>@redis:6379"
  REDIS_PASSWORD: "<REPLACE_ME>"

  # JWT
  JWT_SECRET: "<REPLACE_ME_GENERATE_64_CHARS>"
  JWT_REFRESH_SECRET: "<REPLACE_ME_GENERATE_64_CHARS>"

  # Encryption
  ENCRYPTION_KEY: "<REPLACE_ME_GENERATE_32_CHARS>"
  COOKIE_ENCRYPTION_KEY: "<REPLACE_ME_GENERATE_32_CHARS>"
  TOKEN_ENCRYPTION_KEY: "<REPLACE_ME_GENERATE_32_CHARS>"

  # External Services
  SMTP_HOST: "<REPLACE_ME>"
  SMTP_PORT: "587"
  SMTP_USER: "<REPLACE_ME>"
  SMTP_PASSWORD: "<REPLACE_ME>"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: matrixflow-erp
type: Opaque
stringData:
  POSTGRES_DB: "matrixflow"
  POSTGRES_USER: "<REPLACE_ME>"
  POSTGRES_PASSWORD: "<REPLACE_ME_GENERATE_STRONG_PASSWORD>"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: matrixflow
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: matrixflow-erp
type: Opaque
stringData:
  REDIS_PASSWORD: "<REPLACE_ME_GENERATE_STRONG_PASSWORD>"
