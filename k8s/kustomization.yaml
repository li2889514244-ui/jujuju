apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: matrixflow

resources:
  # Namespace
  - namespace.yaml

  # ConfigMaps, Secrets & ServiceAccounts
  - configmap.yaml
  - secrets.yaml
  - service-accounts.yaml

  # PostgreSQL
  - postgres/pvc.yaml
  - postgres/service.yaml
  - postgres/statefulset.yaml

  # Redis
  - redis/pvc.yaml
  - redis/service.yaml
  - redis/deployment.yaml

  # Backend
  - backend/service.yaml
  - backend/deployment.yaml
  - backend/hpa.yaml

  # Frontend
  - frontend/service.yaml
  - frontend/deployment.yaml

  # Ingress
  - ingress.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: matrixflow-erp

images:
  - name: ghcr.io/matrixflow/frontend
    newTag: latest
  - name: ghcr.io/matrixflow/backend
    newTag: latest
