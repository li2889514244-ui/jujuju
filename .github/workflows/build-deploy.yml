name: Build and Deploy to ECS

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/src/**'
      - 'backend/package.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        working-directory: backend
        run: |
          npm install
          npx prisma generate
          npx nest build
          tar czf ../dist.tar.gz dist node_modules

      - name: Upload to ECS
        run: |
          DIST_B64=$(base64 -w0 dist.tar.gz)
          echo "Uploading $(wc -c < dist.tar.gz) bytes..."
          # Split into chunks and upload via Alibaba Cloud API
          # (detailed deploy logic)
