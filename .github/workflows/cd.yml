name: CD Pipeline

on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend (Alibaba Cloud ECS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Alibaba Cloud SDK
        run: npm install @alicloud/pop-core

      - name: Deploy to Alibaba Cloud ECS
        run: node deploy-ali.js
        env:
          ALI_ACCESS_KEY_ID: ${{ secrets.ALI_ACCESS_KEY_ID }}
          ALI_ACCESS_KEY_SECRET: ${{ secrets.ALI_ACCESS_KEY_SECRET }}
          DB_PASS: ${{ secrets.DB_PASS }}
          REDIS_PASS: ${{ secrets.REDIS_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          COOKIE_ENCRYPTION_KEY: ${{ secrets.COOKIE_ENCRYPTION_KEY }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}

  verify:
    name: Verify Deployment
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deploy
        run: sleep 180

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            RESP=$(curl -s http://${{ secrets.ECS_PUBLIC_IP }}:3000/api/v1/health)
            echo "Health ($i): $RESP"
            if echo "$RESP" | grep -q '"status":"ok"'; then
              echo "✅ Backend is healthy"
              exit 0
            fi
            sleep 30
          done
          echo "❌ Backend health check failed"
          exit 1
