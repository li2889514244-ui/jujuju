name: Deploy Backend to ECS

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-ecs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy (git pull + restart)
        run: |
          npm install @alicloud/pop-core
          node -e "
          const Core=require('@alicloud/pop-core');
          const c=new Core({accessKeyId:process.env.ALI_KEY,accessKeySecret:process.env.ALI_SEC, endpoint:'https://ecs.cn-guangzhou.aliyuncs.com',apiVersion:'2014-05-26'});
          const script='#!/bin/bash\nset -e\ncd /opt/matrixflow\ngit fetch origin master\ngit reset --hard origin/master\nnpm ci\nnpm run build --workspace=backend\nnpm run build --workspace=frontend\npm2 restart matrixflow 2>/dev/null || (cd backend && pm2 start dist/main.js --name matrixflow)\nif [ -d /var/www/matrixflow ]; then rm -rf /var/www/matrixflow/* && cp -r frontend/dist/* /var/www/matrixflow/; fi\ndocker exec matrixflow-frontend nginx -s reload 2>/dev/null || true\nsleep 3\ncurl -sf --max-time 5 http://localhost:3000/api/v1/health && echo DEPLOY_OK || echo DEPLOY_FAIL';
          const b64=Buffer.from(script).toString('base64');
          c.request('CreateCommand',{RegionId:'cn-guangzhou',Name:'gh-deploy',Type:'RunShellScript',CommandContent:b64,ContentEncoding:'Base64',Timeout:'600',WorkingDir:'/root'}).then(r=>c.request('InvokeCommand',{RegionId:'cn-guangzhou',CommandId:r.CommandId,'InstanceId.1':'i-7xvb9wno2duq8msd35l1',Timed:false}).then(inv=>{setTimeout(()=>c.request('DescribeInvocationResults',{RegionId:'cn-guangzhou',InvokeId:inv.InvokeId}).then(res=>{const o=(res.Invocation.InvocationResults.InvocationResult[0]);console.log(o.Output?Buffer.from(o.Output,'base64').toString():'DONE')}),610000)}))
          "
        env:
          ALI_KEY: ${{ secrets.ECS_ACCESS_KEY }}
          ALI_SEC: ${{ secrets.ECS_SECRET_KEY }}

  seed:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Seed analytics data
        run: |
          npm install @alicloud/pop-core
          node -e "
          const Core=require('@alicloud/pop-core');
          const c=new Core({accessKeyId:process.env.ALI_KEY,accessKeySecret:process.env.ALI_SEC, endpoint:'https://ecs.cn-guangzhou.aliyuncs.com',apiVersion:'2014-05-26'});
          const b64=Buffer.from('#!/bin/bash\ncd /opt/matrixflow/backend && npx ts-node prisma/seed.ts 2>&1').toString('base64');
          c.request('CreateCommand',{RegionId:'cn-guangzhou',Name:'gh-seed',Type:'RunShellScript',CommandContent:b64,ContentEncoding:'Base64',Timeout:'300',WorkingDir:'/opt/matrixflow/backend'}).then(r=>c.request('InvokeCommand',{RegionId:'cn-guangzhou',CommandId:r.CommandId,'InstanceId.1':'i-7xvb9wno2duq8msd35l1',Timed:false}).then(inv=>{setTimeout(()=>c.request('DescribeInvocationResults',{RegionId:'cn-guangzhou',InvokeId:inv.InvokeId}).then(res=>{const o=(res.Invocation.InvocationResults.InvocationResult[0]);console.log(o.Output?Buffer.from(o.Output,'base64').toString():'DONE')}),310000)}))
          "
        env:
          ALI_KEY: ${{ secrets.ECS_ACCESS_KEY }}
          ALI_SEC: ${{ secrets.ECS_SECRET_KEY }}
