version: '3.8'

# MatrixFlow ERP — 阿里云 ECS 生产部署配置
# 用法: docker compose up -d
services:

  # ========== PostgreSQL 16 ==========
  db:
    image: postgres:16-alpine
    container_name: matrixflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: matrixflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 1g
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - matrixflow

  # ========== Redis 7 ==========
  redis:
    image: redis:7-alpine
    container_name: matrixflow-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS}
    volumes:
      - redisdata:/data
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASS}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - matrixflow

  # ========== Nginx 反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: matrixflow-nginx
    restart: always
    ports:
      - '80:80'
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 128m
    security_opt:
      - no-new-privileges:true
    networks:
      - matrixflow

  # ========== Cloudflare Tunnel (绕过 ICP 备案) ==========
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: matrixflow-tunnel
    restart: always
    command: tunnel run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 64m
    security_opt:
      - no-new-privileges:true
    networks:
      - matrixflow

  # ========== 后端 API + Python Bridge ==========
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: matrixflow-backend
    restart: always
    ports:
      - '3000:3000'
      - '8000:8000'
    environment:
      # 数据库
      DATABASE_URL: postgresql://postgres:${DB_PASS}@db:5432/matrixflow
      # Redis
      REDIS_URL: redis://:${REDIS_PASS}@redis:6379
      # 应用
      NODE_ENV: production
      PORT: 3000
      # 安全
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      COOKIE_ENCRYPTION_KEY: ${COOKIE_ENCRYPTION_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-https://jujuju-28b.pages.dev,https://ddddkiii.com,https://www.ddddkiii.com}
      # Python Bridge
      PYTHON_BRIDGE_URL: http://localhost:8000
      # 日志
      LOG_LEVEL: warn
      LOG_DIR: /app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    mem_limit: 2g
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - matrixflow

volumes:
  pgdata:
  redisdata:
  uploads_data:
  logs_data:

networks:
  matrixflow:
    driver: bridge