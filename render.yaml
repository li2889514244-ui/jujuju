services:
  # ========== PostgreSQL ==========
  - type: pserv
    name: matrixflow-postgres
    plan: free
    databaseName: matrixflow_erp
    user: matrixflow

  # ========== Redis ==========
  - type: redis
    name: matrixflow-redis
    plan: free
    ipAllowList: []

  # ========== Backend API ==========
  - type: web_service
    name: matrixflow-backend
    plan: free
    runtime: node
    region: singapore
    buildCommand: npm i -g pnpm@9 && pnpm install --frozen-lockfile --filter matrixflow-backend && cd backend && ./node_modules/.bin/prisma generate && ./node_modules/.bin/nest build
    startCommand: sh -c "cd backend && ./node_modules/.bin/prisma migrate deploy && node dist/main.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: matrixflow-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: matrixflow-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://ddddkiii.com
      - key: COOKIE_ENCRYPTION_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: warn
    healthCheckPath: /api/v1/health
    autoDeploy: true
