services:
  # ========== PostgreSQL ==========
  - type: pserv
    name: matrixflow-postgres
    plan: free
    databaseName: matrixflow_erp
    user: matrixflow

  # ========== Redis ==========
  - type: redis
    name: matrixflow-redis
    plan: free
    ipAllowList: []

  # ========== Backend API ==========
  - type: web_service
    name: matrixflow-backend
    plan: free
    runtime: node
    region: singapore
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: matrixflow-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: matrixflow-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://jujuju-28b.pages.dev
      - key: LOG_LEVEL
        value: warn
    healthCheckPath: /api/v1/health
    autoDeploy: true
